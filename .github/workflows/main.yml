name: Bilibili Auto Task

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  run-task:
    runs-on: ubuntu-latest
    env:
      BILIBILI_AUTH: ${{ secrets.BILIBILI_AUTH }}
      CF_D1: ${{ secrets.CF_D1 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install bilibili-api-python==17.4.2 httpx
      - name: Run script
        run: python main.py
